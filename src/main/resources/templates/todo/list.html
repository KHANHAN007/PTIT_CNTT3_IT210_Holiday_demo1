<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.75rem; text-align: left; }
        th { background: #f4f4f4; }
        .success { background: #e7f7ea; border: 1px solid #b7e1c1; padding: 0.75rem; margin-bottom: 1rem; }
        .empty { margin-top: 1rem; color: #666; }
    </style>
</head>
<body>
<h1>Personal Todo App</h1>

<p><a th:href="@{/new}">+ Add New Todo</a></p>

<div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Content</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Priority</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${todo.dueDate}"></td>
        <td th:text="${todo.status}"></td>
        <td th:text="${todo.priority}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(todos)}">
        <td class="empty" colspan="5">No todo items yet. Create your first task using the form above.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
