<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{list.title}">Todo List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.75rem; text-align: left; }
        th { background: #f4f4f4; }
        .success { background: #e7f7ea; border: 1px solid #b7e1c1; padding: 0.75rem; margin-bottom: 1rem; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; padding: 0.75rem; margin-bottom: 1rem; color: #721c24; }
        .empty { margin-top: 1rem; color: #666; }
        .actions { white-space: nowrap; }
        .actions a, .actions button {
            padding: 0.4rem 0.8rem;
            margin-right: 0.5rem;
            text-decoration: none;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
            display: inline-block;
        }
        .actions a { background: #007bff; color: white; }
        .actions a:hover { background: #0056b3; }
        .actions .delete { background: #dc3545; color: white; border-color: #dc3545; }
        .actions .delete:hover { background: #c82333; }
    </style>
</head>
<body>
<h1 th:text="#{list.heading}">Personal Todo App</h1>

<p>
    <strong th:text="#{list.owner.label}">Danh sach cua:</strong>
    <span th:text="${ownerName}">Owner</span>
    <a th:href="@{/owner}" th:text="#{list.owner.change}">Doi chu so huu</a>
</p>

<p>
    <a th:href="@{/(lang='vi')}" th:text="#{language.vi}">Tieng Viet</a>
    |
    <a th:href="@{/(lang='en')}" th:text="#{language.en}">English</a>
</p>

<p><a th:href="@{/new}" th:text="#{list.add}">+ Add New Todo</a></p>

<div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>
<div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

<table>
    <thead>
    <tr>
        <th th:text="#{table.id}">ID</th>
        <th th:text="#{table.content}">Content</th>
        <th th:text="#{table.dueDate}">Due Date</th>
        <th th:text="#{table.status}">Status</th>
        <th th:text="#{table.priority}">Priority</th>
        <th th:text="#{table.actions}">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${todo.dueDate}"></td>
        <td th:text="${#messages.msg('todo.status.' + todo.status.name())}"></td>
        <td th:text="${#messages.msg('todo.priority.' + todo.priority.name())}"></td>
        <td class="actions">
            <a th:href="@{/edit/{id}(id=${todo.id})}" th:text="#{action.edit}">Edit</a>
            <a class="delete" th:href="@{/delete/{id}(id=${todo.id})}" th:onclick="|return confirm('${#messages.msg('confirm.delete')}');|" th:text="#{action.delete}">Delete</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(todos)}">
        <td class="empty" colspan="6" th:text="#{list.empty}">No todo items yet. Create your first task using the form above.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
