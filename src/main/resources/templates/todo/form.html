<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
  <meta charset="UTF-8">
  <title th:text="${todo.id} ? #{form.title.edit} : #{form.title.create}">Add Todo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .form-row { margin-bottom: 1rem; }
    label { display: block; font-weight: bold; margin-bottom: 0.35rem; }
    input, select { width: 320px; max-width: 100%; padding: 0.5rem; }
    .error { color: #b00020; font-size: 0.9rem; margin-top: 0.25rem; }
    .actions { margin-top: 1.5rem; }
    button { padding: 0.5rem 1rem; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
<h1 th:text="${todo.id} ? #{form.heading.edit} : #{form.heading.create}">Create Todo</h1>

<p>
  <a th:href="@{/new(lang='vi')}" th:text="#{language.vi}">Tieng Viet</a>
  |
  <a th:href="@{/new(lang='en')}" th:text="#{language.en}">English</a>
</p>

<p><a th:href="@{/}" th:text="#{action.back}">Back to list</a></p>

<form th:action="@{/save}" method="post" th:object="${todo}">
  <input type="hidden" th:field="*{id}"/>

  <div class="form-row">
    <label for="content" th:text="#{table.content}">Content</label>
    <input id="content" type="text" th:field="*{content}" th:placeholder="#{form.content.placeholder}"/>
    <div class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
  </div>

  <div class="form-row">
    <label for="dueDate" th:text="#{table.dueDate}">Due Date</label>
    <input id="dueDate" type="date" th:field="*{dueDate}"/>
    <div class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></div>
  </div>

  <div class="form-row">
    <label for="status" th:text="#{table.status}">Status</label>
    <select id="status" th:field="*{status}">
      <option th:each="status : ${statuses}" th:value="${status}" th:text="${#messages.msg('todo.status.' + status.name())}"></option>
    </select>
    <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
  </div>

  <div class="form-row">
    <label for="priority" th:text="#{table.priority}">Priority</label>
    <select id="priority" th:field="*{priority}">
      <option th:each="priority : ${priorities}" th:value="${priority}" th:text="${#messages.msg('todo.priority.' + priority.name())}"></option>
    </select>
    <div class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
  </div>

  <div class="actions">
    <button type="submit" th:text="${todo.id} ? #{action.update} : #{action.save}">Save Todo</button>
  </div>
</form>
</body>
</html>
