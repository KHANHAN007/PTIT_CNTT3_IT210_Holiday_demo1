<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Todo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .form-row { margin-bottom: 1rem; }
    label { display: block; font-weight: bold; margin-bottom: 0.35rem; }
    input, select { width: 320px; max-width: 100%; padding: 0.5rem; }
    .error { color: #b00020; font-size: 0.9rem; margin-top: 0.25rem; }
    .actions { margin-top: 1.5rem; }
  </style>
</head>
<body>
<h1>Create Todo</h1>

<p><a th:href="@{/}">← Back to list</a></p>

<form th:action="@{/save}" method="post" th:object="${todo}">
  <div class="form-row">
    <label for="content">Content</label>
    <input id="content" type="text" th:field="*{content}" placeholder="Enter todo content"/>
    <div class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
  </div>

  <div class="form-row">
    <label for="dueDate">Due Date</label>
    <input id="dueDate" type="date" th:field="*{dueDate}"/>
    <div class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></div>
  </div>

  <div class="form-row">
    <label for="status">Status</label>
    <select id="status" th:field="*{status}">
      <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
    </select>
    <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
  </div>

  <div class="form-row">
    <label for="priority">Priority</label>
    <select id="priority" th:field="*{priority}">
      <option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority}"></option>
    </select>
    <div class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
  </div>

  <div class="actions">
    <button type="submit">Save Todo</button>
  </div>
</form>
</body>
</html>
