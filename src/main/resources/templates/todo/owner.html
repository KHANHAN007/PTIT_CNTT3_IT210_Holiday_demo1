<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{owner.title}">Owner</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .form-row { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.35rem; }
        input { width: 320px; max-width: 100%; padding: 0.5rem; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; padding: 0.75rem; margin-bottom: 1rem; color: #721c24; }
        button { padding: 0.5rem 1rem; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
<h1 th:text="#{owner.heading}">Nhap chu so huu</h1>

<p>
    <a th:href="@{/owner(lang='vi')}" th:text="#{language.vi}">Tieng Viet</a>
    |
    <a th:href="@{/owner(lang='en')}" th:text="#{language.en}">English</a>
</p>

<div class="error" th:if="${ownerError}" th:text="${ownerError}"></div>

<form th:action="@{/owner}" method="post">
    <div class="form-row">
        <label for="ownerName" th:text="#{owner.label}">Chu so huu</label>
        <input id="ownerName" name="ownerName" type="text" th:value="${ownerName}" th:placeholder="#{owner.placeholder}"/>
    </div>
    <button type="submit" th:text="#{owner.submit}">Bat dau</button>
</form>
</body>
</html>
